# ============================================================
#  SecureBank Application Properties
#  Trainer: Rushi | DevOps Multi-Cloud Training
# ============================================================

spring.application.name=securebank

# ============================================================
#  MySQL Database Configuration
#  Database: securebank_db (was bankappdb in trainer's example)
#  Tables  : customers, transaction_history
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/securebank_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=securebank_user
spring.datasource.password=yourpassword@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
#  JPA / Hibernate Configuration
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
#  Server Configuration
# ============================================================
server.port=8080
server.error.include-message=always

# ============================================================
#  Application Branding
# ============================================================
info.app.name=SecureBank
info.app.description=Banking Application by Rushi - DevOps Multi-Cloud Training
info.app.version=1.0.0
